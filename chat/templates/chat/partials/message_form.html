{% load static %}
<form method="POST" enctype="multipart/form-data" class="message-form" id="{{ form_id }}">
    {% csrf_token %}
    {{ message_form.text }}
    {% if message_form.text.errors %}
        <div class="field-error">{{ message_form.text.errors|first }}</div>
    {% endif %}
    <input type="hidden" name="action" value="send_message">
    {% if homework_id %}
        <input type="hidden" name="homework_id" value="{{ homework_id }}">
    {% endif %}

    <div class="message-form-footer">
        <label for="{{ form_id }}_fileInput" class="file-attach-btn" title="Прикріпити файл">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
            </svg>
        </label>
        <input type="file" id="{{ form_id }}_fileInput" class="file-input-hidden">
        <span class="file-name-chip" id="{{ file_chip_id }}"></span>

        <span class="message-form-spacer"></span>

        <button type="submit">Відправити</button>
    </div>
</form>

<script src="{% static 'js/form_utils.js' %}"></script>
<script src="{% static 'chat/js/message_form.js' %}"></script>
<script>
    initFileChip('{{ form_id }}_fileInput', '{{ file_chip_id }}', {% if max_file_size %}{{ max_file_size }}{% else %}Infinity{% endif %});
    autoGrowTextarea('{{ text_field_id }}', {{ max_height }});

    {% if conversation_id %}
    initChatSocket({
        conversationId: {{ conversation_id }},
        currentUserId: {{ current_user_id|default:"null" }},
        chatContainerId: 'chatMessages',
        homeworkUrlTemplate: "{% url 'detail_homework' 0 %}",
        fileUrlTemplate: "{% url 'download_chat_file' 0 %}",
        formId: '{{ form_id }}',
        textareaId: '{{ text_field_id }}',
        fileInputId: '{{ form_id }}_fileInput',
        fileChipId: '{{ file_chip_id }}',
    });
    {% endif %}
</script>
